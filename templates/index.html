<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="game-container">
    <h1 class="title">Tic <span>Tac</span> Toe</h1>

    <div id="mode-select" class="mode-container">
        <button class="btn primary-btn" onclick="startGame('pvp')">👥 Player vs Player</button>
        <button class="btn secondary-btn" onclick="startGame('ai')">🤖 Player vs AI</button>
    </div>

    <h2 id="status" class="status-text"></h2>

    <div id="board" class="hidden">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
        <button onclick="resetGame()" class="btn action-btn hidden" id="restartBtn">Restart</button>
        <button onclick="changeMode()" class="btn action-btn hidden" id="modeBtn">Menu</button>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
